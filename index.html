<!DOCTYPE html>
<html>
<head>
<title>Website Uptime Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
background:white;
width:500px;
margin:auto;
padding:20px;
border-radius:10px;
}

input{
padding:8px;
width:250px;
}

button{
padding:8px 15px;
}

canvas{
width:200px !important;
height:200px !important;
margin:auto;
}

</style>
</head>

<body>

<div class="container">

<h2>Website Uptime Monitor</h2>

<form method="POST">
<input type="text" name="url" placeholder="Enter website URL" required>
<button type="submit">Check</button>
</form>

{% if status %}
<h3>Status: {{status}}</h3>
{% endif %}

<h3>Uptime Chart</h3>

<canvas id="chart"></canvas>

</div>

<script>

fetch('/chart-data')
.then(response => response.json())
.then(data => {

const ctx = document.getElementById('chart');

new Chart(ctx, {
type: 'pie',
data: {
labels: ['Online','Offline'],
datasets: [{
data: [data.online,data.offline]
}]
}
});

});

</script>

</body>
</html>
